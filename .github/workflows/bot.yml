name: Run Trading Bot

on:
  schedule:
    - cron: "*/5 4-10 * * 1-5"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install yfinance pandas requests

    - name: Run bot
      run: python pro_strategy_v6.py
