name: Run Trading Bot

on:
  schedule:
    - cron: "*/5 3-11 * * 1-5"   # Covers 8:30 AM – 4:30 PM IST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install yfinance pandas requests numpy

    - name: Run bot
      run: python pro_strategy_v4.py
